{% extends "base.html" %}
{% block page_title %}{{ 'Edit Supplier' if supplier else 'Add Supplier' }}{% endblock %}
{% block content %}

<div style="max-width:600px;">
  <h2 style="font-size:1.4rem;font-weight:700;color:#1a1a2e;margin-bottom:20px;">
    {{ '✏️ Edit Supplier' if supplier else '➕ Add Supplier' }}
  </h2>

  <div class="card" style="padding:28px;">
    <form method="POST">
      <div style="margin-bottom:16px;">
        <label class="form-label">Supplier Name *</label>
        <input type="text" name="name" class="form-input" required
               value="{{ supplier.name if supplier else '' }}" placeholder="e.g. Fashion Hub">
      </div>
      <div style="margin-bottom:16px;">
        <label class="form-label">Contact Number</label>
        <input type="text" name="contact" class="form-input"
               value="{{ supplier.contact if supplier else '' }}" placeholder="e.g. 9876543210">
      </div>
      <div style="margin-bottom:24px;">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-input" rows="3"
                  placeholder="City, State">{{ supplier.address if supplier else '' }}</textarea>
      </div>
      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-accent">
          {{ '💾 Update Supplier' if supplier else '✔ Save Supplier' }}
        </button>
        <a href="{{ url_for('suppliers_page') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
