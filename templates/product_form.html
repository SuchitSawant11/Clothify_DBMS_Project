{% extends "base.html" %}
{% block page_title %}{{ 'Edit Product' if product else 'Add Product' }}{% endblock %}
{% block content %}

<div style="max-width:900px;">
  <h2 style="font-size:1.4rem;font-weight:700;color:#1a1a2e;margin-bottom:20px;">
    {{ '✏️ Edit Product' if product else '➕ Add Product' }}
  </h2>

  <div class="card">
    <form method="post" enctype="multipart/form-data" style="display:grid;grid-template-columns:240px 1fr;gap:0;">

      <!-- LEFT: image -->
      <div style="padding:28px;border-right:1px solid #f0ede5;display:flex;flex-direction:column;gap:16px;">
        <label class="form-label">Product Image</label>
        <div style="width:100%;height:200px;background:#f5f4f0;border-radius:10px;overflow:hidden;border:1.5px dashed #ddd8ce;">
          <img id="imgPreview"
               src="{{ product.image_url if product and product.image_url else url_for('static', filename='images/default_product.jpg') }}"
               style="width:100%;height:100%;object-fit:cover;"
               onerror="this.src='/static/images/default_product.jpg'">
        </div>
        <div>
          <label class="form-label">Image URL</label>
          <input type="text" name="image_url" id="image_url" class="form-input"
                 value="{{ product.image_url if product else '' }}" placeholder="https://…">
        </div>
        <div>
          <label class="form-label">Upload from PC</label>
          <input type="file" name="image_file" id="image_file" accept="image/*" class="form-input" style="padding:6px;">
        </div>
      </div>

      <!-- RIGHT: fields -->
      <div style="padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-content:start;">
        <div>
          <label class="form-label">Name *</label>
          <input type="text" name="name" class="form-input" required
                 value="{{ product.name if product else '' }}" placeholder="Product name">
        </div>
        <div>
          <label class="form-label">Brand</label>
          <input type="text" name="brand" class="form-input"
                 value="{{ product.brand if product else '' }}" placeholder="e.g. Levis">
        </div>
        <div>
          <label class="form-label">Price (₹) *</label>
          <input type="number" name="price" step="0.01" min="0" class="form-input" required
                 value="{{ product.price if product else '' }}" placeholder="0.00">
        </div>
        <div>
          <label class="form-label">Quantity *</label>
          <input type="number" name="quantity" min="0" class="form-input" required
                 value="{{ product.quantity if product else 0 }}">
        </div>
        <div>
          <label class="form-label">Colour</label>
          <input type="text" name="colour" class="form-input"
                 value="{{ product.colour if product else '' }}" placeholder="e.g. Navy Blue">
        </div>
        <div>
          <label class="form-label">Category</label>
          <select name="category_id" class="form-input">
            <option value="">— Select —</option>
            {% for c in categories %}
            <option value="{{ c.id }}" {% if product and product.category_id == c.id %}selected{% endif %}>
              {{ c.name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="form-label">Supplier</label>
          <select name="supplier_id" class="form-input">
            <option value="">— Select —</option>
            {% for s in suppliers %}
            <option value="{{ s.id }}" {% if product and product.supplier_id == s.id %}selected{% endif %}>
              {{ s.name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div></div>
        <div style="grid-column:1/-1;">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-input" rows="3"
                    placeholder="Short product description…">{{ product.description if product else '' }}</textarea>
        </div>
        <div style="grid-column:1/-1;display:flex;gap:12px;margin-top:8px;">
          <button type="submit" class="btn btn-accent" style="padding:10px 24px;">
            {{ '💾 Update Product' if product else '✔ Save Product' }}
          </button>
          <a href="{{ url_for('inventory') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </div>

    </form>
  </div>
</div>

<script>
const imgPreview   = document.getElementById('imgPreview');
const imageUrlInput = document.getElementById('image_url');
const imageFileInput = document.getElementById('image_file');
imageUrlInput.addEventListener('input', () => { if(imageUrlInput.value) imgPreview.src = imageUrlInput.value; });
imageFileInput.addEventListener('change', () => {
  const file = imageFileInput.files[0];
  if (file) { let r = new FileReader(); r.onload = e => imgPreview.src = e.target.result; r.readAsDataURL(file); }
});
</script>
{% endblock %}
